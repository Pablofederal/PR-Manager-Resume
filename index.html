      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;

    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    h1 { color: #e94560; margin-bottom: 10px; }
